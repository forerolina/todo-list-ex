<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo-list</title>
  </head>
  <body>
    <div id="app">
      <main class="todo-app">
        <header class="todo-app__header">
          <h1 class="todo-app__title">Todo List</h1>
        </header>

        <form class="todo-app__form" aria-label="Add a new todo">
          <label class="todo-app__label" for="todo-input">New todo</label>
          <input
            id="todo-input"
            class="todo-app__input"
            type="text"
            name="todo"
            placeholder="What do you need to do?"
            required
          />
          <button class="todo-app__button" type="submit">Add</button>
        </form>

        <section class="todo-app__list-section" aria-label="Todo items">
          <div class="todo-app__list" data-todo-list></div>
        </section>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
